<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastBall</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #1a1a1a;
      --bg2: #222222;
      --bg3: #2a2a2a;
      --accent: #4a9eff;
      --text: #d4d4d4;
      --text-muted: #666666;
      --text-dim: #888888;
      --border: #333333;
      --selected: #2d3748;
      --font: 'SF Mono', 'Menlo', 'Monaco', 'Consolas', monospace;
      --font-size: 12px;
    }

    html, body {
      width: 400px;
      height: 500px;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: var(--font-size);
      -webkit-font-smoothing: antialiased;
      user-select: none;
    }

    .view {
      display: none;
      width: 100%;
      height: 100%;
      flex-direction: column;
    }

    .view.active {
      display: flex;
    }

    /* ── List View ─────────────────────────────────── */

    #list-view {
      position: relative;
    }

    #list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px 8px;
      border-bottom: 1px solid var(--border);
      -webkit-app-region: drag;
      flex-shrink: 0;
    }

    #list-title {
      color: var(--text-dim);
      font-size: 11px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    #settings-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 16px;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 3px;
      line-height: 1;
      -webkit-app-region: no-drag;
      transition: color 0.15s;
    }

    #settings-btn:hover {
      color: var(--text);
    }

    #list-container {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 4px 0;
    }

    #list-container::-webkit-scrollbar {
      width: 4px;
    }

    #list-container::-webkit-scrollbar-track {
      background: transparent;
    }

    #list-container::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    .note-row {
      display: flex;
      align-items: baseline;
      padding: 7px 12px;
      cursor: pointer;
      gap: 8px;
    }

    .note-row:hover,
    .note-row.selected {
      background: var(--selected);
    }

    .note-row.selected .note-name {
      color: var(--accent);
    }

    .note-name {
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex-shrink: 0;
      max-width: 45%;
    }

    .note-preview {
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      font-size: 11px;
    }

    #empty-state {
      color: var(--text-muted);
      text-align: center;
      padding: 60px 20px;
      font-size: 12px;
      line-height: 1.6;
    }

    /* ── Editor View ───────────────────────────────── */

    #editor-header {
      display: flex;
      align-items: center;
      padding: 10px 12px 8px;
      border-bottom: 1px solid var(--border);
      gap: 8px;
      flex-shrink: 0;
      -webkit-app-region: drag;
    }

    #editor-back-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 14px;
      cursor: pointer;
      padding: 0 4px;
      -webkit-app-region: no-drag;
    }

    #editor-back-btn:hover {
      color: var(--text);
    }

    #editor-title {
      color: var(--text);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    #editor-content {
      flex: 1;
      background: var(--bg);
      color: var(--text);
      border: none;
      outline: none;
      resize: none;
      font-family: var(--font);
      font-size: var(--font-size);
      padding: 12px;
      line-height: 1.6;
      overflow-y: auto;
    }

    #editor-content::-webkit-scrollbar {
      width: 4px;
    }

    #editor-content::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    #editor-hints {
      padding: 6px 12px;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 10px;
      display: flex;
      gap: 12px;
      flex-shrink: 0;
    }

    /* ── Capture View ──────────────────────────────── */

    #capture-header {
      display: flex;
      align-items: center;
      padding: 10px 12px 8px;
      border-bottom: 1px solid var(--border);
      gap: 8px;
      flex-shrink: 0;
      -webkit-app-region: drag;
    }

    #capture-label {
      color: var(--text-dim);
      font-size: 11px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    #capture-hint {
      margin-left: auto;
      color: var(--text-muted);
      font-size: 10px;
      -webkit-app-region: no-drag;
    }

    #capture-textarea {
      flex: 1;
      background: var(--bg);
      color: var(--text);
      border: none;
      outline: none;
      resize: none;
      font-family: var(--font);
      font-size: var(--font-size);
      padding: 12px;
      line-height: 1.6;
    }

    #capture-footer {
      padding: 6px 12px;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 10px;
      display: flex;
      gap: 12px;
      flex-shrink: 0;
    }

    /* ── Settings View ─────────────────────────────── */

    #settings-header {
      display: flex;
      align-items: center;
      padding: 10px 12px 8px;
      border-bottom: 1px solid var(--border);
      gap: 8px;
      flex-shrink: 0;
      -webkit-app-region: drag;
    }

    #settings-back-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 14px;
      cursor: pointer;
      padding: 0 4px;
      -webkit-app-region: no-drag;
    }

    #settings-back-btn:hover {
      color: var(--text);
    }

    #settings-title {
      color: var(--text);
      font-size: 12px;
    }

    #settings-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .setting-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .setting-label {
      color: var(--text-dim);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .setting-input-row {
      display: flex;
      gap: 6px;
    }

    .setting-input {
      flex: 1;
      background: var(--bg3);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 6px 8px;
      font-family: var(--font);
      font-size: var(--font-size);
      outline: none;
    }

    .setting-input:focus {
      border-color: var(--accent);
    }

    .setting-btn {
      background: var(--bg3);
      color: var(--text-dim);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 6px 10px;
      font-family: var(--font);
      font-size: var(--font-size);
      cursor: pointer;
      white-space: nowrap;
    }

    .setting-btn:hover {
      color: var(--text);
      border-color: var(--text-muted);
    }

    #settings-error {
      color: #ff6b6b;
      font-size: 11px;
      min-height: 16px;
    }

    #settings-footer {
      padding: 10px 12px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      flex-shrink: 0;
    }

    #settings-save {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 7px 18px;
      font-family: var(--font);
      font-size: var(--font-size);
      cursor: pointer;
    }

    #settings-save:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>

  <!-- ── List View ── -->
  <div id="list-view" class="view">
    <div id="list-header">
      <span id="list-title">Notes</span>
      <button id="settings-btn" title="Settings (⌘,)">⚙</button>
    </div>
    <div id="list-container">
      <p id="empty-state">Start typing to create a note</p>
    </div>
  </div>

  <!-- ── Editor View ── -->
  <div id="editor-view" class="view">
    <div id="editor-header">
      <button id="editor-back-btn" title="Back (ESC)">←</button>
      <span id="editor-title"></span>
    </div>
    <textarea id="editor-content" spellcheck="false"></textarea>
    <div id="editor-hints">
      <span>ESC back</span>
      <span>⌘O open</span>
      <span>⇧⌘C clear</span>
      <span>⌘W hide</span>
    </div>
  </div>

  <!-- ── Capture View ── -->
  <div id="capture-view" class="view">
    <div id="capture-header">
      <span id="capture-label">New Note</span>
      <span id="capture-hint">⌘↵ save · ESC cancel</span>
    </div>
    <textarea id="capture-textarea" spellcheck="false" placeholder="Start writing…"></textarea>
    <div id="capture-footer">
      <span>⌘↵ save and close</span>
      <span>ESC discard</span>
    </div>
  </div>

  <!-- ── Settings View ── -->
  <div id="settings-view" class="view">
    <div id="settings-header">
      <button id="settings-back-btn" title="Back (ESC)">←</button>
      <span id="settings-title">Settings</span>
    </div>
    <div id="settings-body">
      <div class="setting-group">
        <label class="setting-label" for="setting-notes-folder">Notes Folder</label>
        <div class="setting-input-row">
          <input id="setting-notes-folder" class="setting-input" type="text" placeholder="~/Notes" />
          <button id="browse-folder-btn" class="setting-btn">Browse</button>
        </div>
      </div>
      <div class="setting-group">
        <label class="setting-label" for="setting-shortcut">Global Shortcut</label>
        <input id="setting-shortcut" class="setting-input" type="text" placeholder="Ctrl+Cmd+," />
      </div>
      <div class="setting-group">
        <label class="setting-label" for="setting-editor">Preferred Editor</label>
        <div class="setting-input-row">
          <input id="setting-editor" class="setting-input" type="text" placeholder="/usr/local/bin/code" />
          <button id="browse-btn" class="setting-btn">Browse</button>
        </div>
      </div>
      <div id="settings-error"></div>
    </div>
    <div id="settings-footer">
      <button id="settings-save">Save</button>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
